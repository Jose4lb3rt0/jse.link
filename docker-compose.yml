services:
  cache:
    image: redis:alpine
    container_name: url-shortener-cache
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: url-shortener-backend
    restart: unless-stopped
    depends_on:
      - cache
    environment:
      NODE_ENV: production
      PORT: 5000
      BASE_URL: http://localhost:5000
      TRUST_PROXY: "true"
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: redis://cache:6379
      API_KEY: ${API_KEY}
      POST_RATE_LIMIT_PER_MINUTE: 10
      REDIRECT_RATE_LIMIT_PER_MINUTE: 100
      DEMO_URL_QUOTA_MAX: 50
      DEMO_URL_QUOTA_WINDOW_SECONDS: 86400
      REDIRECT_CACHE_TTL_SECONDS: 3600
      DEFAULT_URL_TTL_SECONDS: 2592000
      MAX_URL_TTL_SECONDS: 2592000
      DOMAIN_BLACKLIST: localhost,example-malware.test
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
        NEXT_PUBLIC_API_KEY: ${API_KEY}
    container_name: url-shortener-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
